version: "3.9"

services:
  postgres:
    image: postgres:16.4
    container_name: gestion-armes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DATABASE:-gestion_armes_vdp}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - ./.docker/postgres/data:/var/lib/postgresql/data
      - ./database/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${PG_USER:-postgres} -d ${PG_DATABASE:-gestion_armes_vdp}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
