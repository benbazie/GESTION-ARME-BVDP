<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SGI AMO (DEV)</title>

  <!-- Meta CSP : tout sur une ligne, connect-src incluant localhost:3001 et le WS du live-reload -->
  <meta http-equiv="Content-Security-Policy"
        content="
          default-src 'self';
          script-src  'self' 'unsafe-inline' 'unsafe-eval';
          connect-src 'self' http://localhost:3001 http://127.0.0.1:3001 ws://localhost:3000 wss://localhost:3000;
          style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
          font-src    'self' https://fonts.gstatic.com;
          img-src     'self' data: blob: https: http:;
        " />

  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <div id="root"></div>
</body>
</html>
